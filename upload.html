<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Documents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section>
    <div class="login-box" style="height:650px;">
        <form action="#" method="post" enctype="multipart/form-data">

            <h2>Upload Documents</h2>

            <div class="input-box">
                <label>Aadhar Card</label><br><br>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>

            <div class="input-box">
                <label>10th Marksheet</label><br><br>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>

            <div class="input-box">
                <label>12th Marksheet</label><br><br>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>

            <div class="input-box">
                <label>Passport Size Photo</label><br><br>
                <input type="file" accept=".jpg,.jpeg,.png" required>
            </div>

            <div class="input-box">
                <label>Leaving Certificate</label><br><br>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png">
            </div>

            <button type="submit">Upload Documents</button>

            <div class="login-register">
                <p>
                    <a href="editprofile.html">Next → Edit Profile</a>
                </p>
            </div>

        </form>
    </div>
</section>

</body>
</html>
