
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Home</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#003366;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    margin-top:40px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    color:#003366;
}

input[type=file]{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.menu{
    margin-top:30px;
}

.menu a{
    display:block;
    text-decoration:none;
    background:#28a745;
    color:white;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    text-align:center;
}

.menu a:hover{
    background:#1f7a34;
}

</style>

</head>

<body>

<header>
<h1>Student Registration System</h1>
</header>

<div class="container">

<div class="card">

<h2>Upload Documents</h2>

<form>

<label>Aadhaar Card</label>
<input type="file">

<label>10th Marksheet</label>
<input type="file">

<label>12th Marksheet</label>
<input type="file">

<label>Passport Size Photo</label>
<input type="file">

<label>Leaving Certificate</label>
<input type="file">

<label>Signature</label>
<input type="file">

<button type="submit">Upload Documents</button>

</form>

<div class="menu">

<a href="register.html">Student Registration</a>

<a href="index.html">Logout</a>

</div>

</div>

</div>

</body>
</html>
